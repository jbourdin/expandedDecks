[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:meilisearch]
command=meilisearch --http-addr 127.0.0.1:7700 --env production --master-key %(ENV_MEILI_MASTER_KEY)s --db-path /var/lib/meilisearch/data
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=5
stopsignal=TERM
stopwaitsecs=10

[program:frankenphp]
command=frankenphp run --config /etc/frankenphp/Caddyfile
user=www-data
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=10
stopsignal=TERM
stopwaitsecs=30

[program:worker-transactional-email]
user=www-data
command=php bin/console messenger:consume transactional_email --time-limit=3600 --memory-limit=256 --sleep=20 --env=prod --no-debug
directory=/app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=20
stopsignal=TERM
stopwaitsecs=30

