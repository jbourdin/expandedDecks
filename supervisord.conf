[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

# Expose supervisord over a unix socket so supervisorctl (and the health check
# endpoint, running as www-data) can query program state. chown to root:www-data
# with chmod 0770 keeps the socket off-limits to anything else in the container.
[unix_http_server]
file=/tmp/supervisor.sock
chmod=0770
chown=root:www-data

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:meilisearch]
command=meilisearch --http-addr 127.0.0.1:7700 --env production --master-key %(ENV_MEILI_MASTER_KEY)s --db-path /var/lib/meilisearch/data
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=5
stopsignal=TERM
stopwaitsecs=10

[program:frankenphp]
command=frankenphp run --config /etc/frankenphp/Caddyfile
user=www-data
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=10
stopsignal=TERM
stopwaitsecs=30

[program:worker-messenger]
user=www-data
command=php bin/console messenger:consume transactional_email notification borrow_lifecycle deck_enrichment tcgdex_sync_series tcgdex_sync_serie tcgdex_sync_set tcgdex_sync_card --time-limit=1200 --memory-limit=512 --sleep=60 --env=prod --no-debug
directory=/app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=20
stopsignal=TERM
stopwaitsecs=30
