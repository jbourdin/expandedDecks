# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.verification_token_ttl: 86400
    app.reset_token_ttl: 3600
    app.deletion_token_ttl: 86400
    app.mail_sender: '%env(MAIL_SENDER)%'
    app.mail_sender_name: '%env(MAIL_SENDER_NAME)%'
    app.friendly_captcha_sitekey: '%env(FRIENDLY_CAPTCHA_SITEKEY)%'
    app.friendly_captcha_api_key: '%env(FRIENDLY_CAPTCHA_API_KEY)%'
    app.friendly_captcha_endpoint: '%env(FRIENDLY_CAPTCHA_ENDPOINT)%'
    app.mosaic_storage_adapter: '%env(MOSAIC_STORAGE_ADAPTER)%'
    app.mosaic_storage_local_dir: '%env(MOSAIC_STORAGE_LOCAL_DIR)%'
    app.mosaic_public_url: '%env(MOSAIC_PUBLIC_URL)%'
    app.scaleway_s3_bucket: '%env(SCALEWAY_S3_BUCKET)%'
    app.scaleway_s3_region: '%env(SCALEWAY_S3_REGION)%'
    app.scaleway_s3_endpoint: '%env(SCALEWAY_S3_ENDPOINT)%'
    app.scaleway_s3_access_key: '%env(SCALEWAY_S3_ACCESS_KEY)%'
    app.scaleway_s3_secret_key: '%env(SCALEWAY_S3_SECRET_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $mailSender: '%app.mail_sender%'
            string $mailSenderName: '%app.mail_sender_name%'
            string $webhookSecret: '%env(MESSENGER_WEBHOOK_SECRET)%'
            string $friendlyCaptchaSitekey: '%app.friendly_captcha_sitekey%'
            string $friendlyCaptchaApiKey: '%app.friendly_captcha_api_key%'
            string $friendlyCaptchaEndpoint: '%app.friendly_captcha_endpoint%'
            string $mosaicStorageAdapter: '%app.mosaic_storage_adapter%'
            string $mosaicStorageLocalDir: '%app.mosaic_storage_local_dir%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DataFixtures/data/'
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Mosaic storage (Flysystem)
    App\Service\Mosaic\MosaicStorageFactory:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $scalewayS3Bucket: '%app.scaleway_s3_bucket%'
            $scalewayS3Region: '%app.scaleway_s3_region%'
            $scalewayS3Endpoint: '%app.scaleway_s3_endpoint%'
            $scalewayS3AccessKey: '%app.scaleway_s3_access_key%'
            $scalewayS3SecretKey: '%app.scaleway_s3_secret_key%'

    mosaic.storage:
        class: League\Flysystem\FilesystemOperator
        factory: ['@App\Service\Mosaic\MosaicStorageFactory', 'create']

    App\Service\Mosaic\MosaicGenerator:
        arguments:
            $mosaicStorage: '@mosaic.storage'
            $projectDir: '%kernel.project_dir%'

    App\Controller\MosaicController:
        arguments:
            $mosaicStorage: '@mosaic.storage'

    App\Service\Label\PdfLabelGenerator:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\EnrichmentFlushService:
        arguments:
            $mosaicStorage: '@mosaic.storage'

    Sentry\Monolog\Handler:
        arguments:
            $hub: '@Sentry\State\HubInterface'
            $level: !php/const Monolog\Level::Error

    Sentry\SentryBundle\Monolog\LogsHandler:
        arguments:
            - !php/const Monolog\Level::Info
