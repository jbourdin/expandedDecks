monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            sentry_logs_fingers:
                type: fingers_crossed
                action_level: error
                handler: sentry_logs
                excluded_http_codes: [400, 401, 403, 404, 405, 409, 410, 422, 429]
            sentry_logs:
                type: service
                id: Sentry\SentryBundle\Monolog\LogsHandler
                level: info
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: grouped
                excluded_http_codes: [400, 401, 403, 404, 405, 409, 410, 422, 429]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            grouped:
                type: group
                members: [nested, sentry]
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            sentry:
                type: service
                id: Sentry\Monolog\Handler
                level: error
            sentry_logs_fingers:
                type: fingers_crossed
                action_level: error
                handler: sentry_logs
                excluded_http_codes: [400, 401, 403, 404, 405, 409, 410, 422, 429]
            sentry_logs:
                type: service
                id: Sentry\SentryBundle\Monolog\LogsHandler
                level: info
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
