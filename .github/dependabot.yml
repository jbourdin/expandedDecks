version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 5
    groups:
      composer-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      composer-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 5
    # webpack-encore 6.0.0 peer-pins typescript@^5 and sass-loader@^16. Majors
    # of those packages make `npm ci` fail with ERESOLVE in the Docker assets
    # stage (strict npm, no .npmrc). Unignore once Encore widens its peer
    # ranges: npm view @symfony/webpack-encore peerDependencies
    ignore:
      - dependency-name: "sass-loader"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      # Mantine packages peer-lock to each other's exact version: a major bump
      # of one package alone can never install. Group them so major upgrades
      # arrive as a single coherent PR.
      mantine-major:
        applies-to: version-updates
        patterns:
          - "@mantine/*"
        update-types:
          - "major"
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
