name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  php-lint:
    name: PHP Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, zip, apcu
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Warm up cache
        run: php bin/console cache:warmup --env=dev
        env:
          DATABASE_URL: "mysql://localhost/expanded_decks_test?serverVersion=8.0&charset=utf8mb4"

      - name: PHP-CS-Fixer (dry-run)
        run: php vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Twig-CS-Fixer (dry-run)
        run: php vendor/bin/twig-cs-fixer lint templates/

      - name: PHPStan
        run: php vendor/bin/phpstan analyse --memory-limit=512M
        env:
          DATABASE_URL: "mysql://localhost/expanded_decks_test?serverVersion=8.0&charset=utf8mb4"

      - name: PHPUnit (unit)
        run: php bin/phpunit --testsuite unit
        env:
          DATABASE_URL: "mysql://localhost/expanded_decks_test?serverVersion=8.0&charset=utf8mb4"

  php-functional:
    name: PHP Functional Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: expanded_decks_test
          MYSQL_USER: expanded_decks
          MYSQL_PASSWORD: expanded_decks
        ports:
          - 3306:3306
        # tmpfs datadir: the test database is dropped and recreated per job and
        # never needs to survive the run — keeping InnoDB in RAM removes disk
        # I/O from every migrate/fixture/test cycle. size=1g is a ceiling;
        # tmpfs only consumes what is written. mode=1777 is required: tmpfs
        # mounts root:755 and mysqld runs as the mysql user.
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --tmpfs /var/lib/mysql:rw,size=1g,mode=1777

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, zip, apcu
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPUnit (functional)
        run: php bin/phpunit --testsuite functional
        env:
          DATABASE_URL: "mysql://expanded_decks:expanded_decks@127.0.0.1:3306/expanded_decks?serverVersion=8.0&charset=utf8mb4"

  php-coverage:
    name: PHP Coverage
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: expanded_decks_test
          MYSQL_USER: expanded_decks
          MYSQL_PASSWORD: expanded_decks
        ports:
          - 3306:3306
        # tmpfs datadir: the test database is dropped and recreated per job and
        # never needs to survive the run — keeping InnoDB in RAM removes disk
        # I/O from every migrate/fixture/test cycle. size=1g is a ceiling;
        # tmpfs only consumes what is written. mode=1777 is required: tmpfs
        # mounts root:755 and mysqld runs as the mysql user.
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --tmpfs /var/lib/mysql:rw,size=1g,mode=1777

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, zip, apcu
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPUnit with coverage
        run: php -d pcov.enabled=1 -d memory_limit=1536M bin/phpunit --coverage-clover var/coverage/clover.xml --coverage-text
        env:
          DATABASE_URL: "mysql://expanded_decks:expanded_decks@127.0.0.1:3306/expanded_decks?serverVersion=8.0&charset=utf8mb4"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: var/coverage/clover.xml

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint assets/

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run

      - name: Encore production build
        run: npx encore production

  # Builds the Dockerfile's assets stage exactly as production does: node:22-slim
  # (npm 10), only the four COPY'd files (no .npmrc), strict `npm ci`. The
  # frontend-quality job above runs on node 24 with the full checkout, which has
  # let lockfiles through that the production image build then rejected (#663).
  docker-assets-stage:
    name: Docker Assets Stage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build assets stage
        run: docker build --target assets .

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, zip
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Composer audit
        run: composer audit

      - name: npm audit
        run: npm audit
